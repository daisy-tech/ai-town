<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥特曼记忆数据浏览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 1.1em;
        }

        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 0.9em;
            color: #cbd5e0;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 控制面板 */
        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        select, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1em;
            transition: all 0.3s;
        }

        select {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            flex: 1;
            min-width: 200px;
            cursor: pointer;
        }

        select option {
            background: #2d3748;
            color: #ffffff;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Tab切换 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 记忆卡片 */
        .memory-grid {
            display: grid;
            gap: 20px;
        }

        .memory-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid;
            transition: all 0.3s;
            cursor: pointer;
        }

        .memory-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .memory-card.conversation {
            border-left-color: #48bb78;
        }

        .memory-card.reflection {
            border-left-color: #9f7aea;
        }

        .memory-card.relationship {
            border-left-color: #ed8936;
        }

        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .memory-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge-player {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .badge-type {
            background: rgba(255, 255, 255, 0.2);
        }

        .badge-importance {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .memory-description {
            color: #e2e8f0;
            line-height: 1.8;
            margin-bottom: 10px;
            font-size: 1.05em;
        }

        .memory-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9em;
            color: #a0aec0;
        }

        .memory-extra {
            font-size: 0.9em;
            color: #cbd5e0;
            margin-top: 8px;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            padding: 20px;
        }

        .pagination button {
            padding: 10px 20px;
        }

        .pagination-info {
            color: #cbd5e0;
        }

        /* 角色统计表格 */
        .player-stats-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .player-stats-table th,
        .player-stats-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-stats-table th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        .player-stats-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-close {
            font-size: 1.5em;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .modal-body {
            line-height: 1.8;
        }

        .detail-row {
            margin-bottom: 15px;
        }

        .detail-label {
            color: #a0aec0;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #ffffff;
            font-size: 1.05em;
        }

        .related-memory-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 奥特曼记忆数据浏览器 🌟</h1>
            <p class="subtitle">探索光之国战士们的记忆世界</p>
        </header>

        <!-- 统计面板 -->
        <div class="stats-panel" id="statsPanel">
            <!-- 通过JS动态生成 -->
        </div>

        <!-- Tab切换 -->
        <div class="tabs">
            <div class="tab active" data-tab="memories">📚 记忆浏览</div>
            <div class="tab" data-tab="stats">📊 统计分析</div>
        </div>

        <!-- Tab内容：记忆浏览 -->
        <div class="tab-content active" id="memories-tab">
            <!-- 控制面板 -->
            <div class="controls">
                <div class="control-row">
                    <select id="playerFilter">
                        <option value="">全部角色</option>
                    </select>

                    <select id="typeFilter">
                        <option value="">全部类型</option>
                        <option value="conversation">💬 对话记忆</option>
                        <option value="reflection">💭 反思记忆</option>
                        <option value="relationship">👥 关系记忆</option>
                    </select>

                    <button onclick="loadMemories()">🔍 查询</button>
                    <button onclick="resetFilters()">🔄 重置</button>
                </div>
            </div>

            <!-- 记忆列表 -->
            <div id="memoryList" class="memory-grid">
                <!-- 通过JS动态生成 -->
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <button onclick="previousPage()" id="prevBtn">上一页</button>
                <span class="pagination-info" id="pageInfo"></span>
                <button onclick="nextPage()" id="nextBtn">下一页</button>
            </div>
        </div>

        <!-- Tab内容：统计分析 -->
        <div class="tab-content" id="stats-tab">
            <div class="controls">
                <h2 style="margin-bottom: 20px;">📈 角色记忆统计</h2>
                <table class="player-stats-table" id="playerStatsTable">
                    <!-- 通过JS动态生成 -->
                </table>
            </div>

            <div class="controls" style="margin-top: 25px;">
                <h2 style="margin-bottom: 20px;">🕐 最近记忆</h2>
                <div id="recentMemoriesList" class="memory-grid">
                    <!-- 通过JS动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>记忆详情</h2>
                <span class="modal-close" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 通过JS动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'http://localhost:5173'; // Convex dev服务器
        const PAGE_SIZE = 20;

        // 状态
        let currentPage = 0;
        let totalItems = 0;
        let currentFilters = {
            playerName: '',
            memoryType: ''
        };

        // 初始化
        window.onload = async function() {
            await loadStats();
            await loadPlayers();
            await loadMemories();
            setupTabs();
        };

        // Tab切换
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;

                    // 切换active状态
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                    tab.classList.add('active');
                    document.getElementById(tabName + '-tab').classList.add('active');
                });
            });
        }

        // 加载统计数据
        async function loadStats() {
            try {
                // 模拟API调用 - 实际应该通过Convex客户端
                const mockStats = {
                    total: 0,
                    typeStats: { conversation: 0, reflection: 0, relationship: 0 },
                    avgImportance: 0,
                    playerStats: [],
                    recentMemories: []
                };

                displayStats(mockStats);
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 显示统计数据
        function displayStats(stats) {
            const statsPanel = document.getElementById('statsPanel');
            statsPanel.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">📝 总记忆数</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">💬 对话记忆</div>
                    <div class="stat-value">${stats.typeStats.conversation}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">💭 反思记忆</div>
                    <div class="stat-value">${stats.typeStats.reflection}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⭐ 平均重要性</div>
                    <div class="stat-value">${stats.avgImportance}</div>
                </div>
            `;

            // 角色统计表格
            if (stats.playerStats && stats.playerStats.length > 0) {
                const tableBody = stats.playerStats.map(p => `
                    <tr>
                        <td>${p.playerName}</td>
                        <td>${p.totalMemories}</td>
                        <td>${p.conversations}</td>
                        <td>${p.reflections}</td>
                        <td>${p.avgImportance}</td>
                    </tr>
                `).join('');

                document.getElementById('playerStatsTable').innerHTML = `
                    <thead>
                        <tr>
                            <th>角色名称</th>
                            <th>总记忆数</th>
                            <th>对话记忆</th>
                            <th>反思记忆</th>
                            <th>平均重要性</th>
                        </tr>
                    </thead>
                    <tbody>${tableBody}</tbody>
                `;
            }

            // 最近记忆
            if (stats.recentMemories && stats.recentMemories.length > 0) {
                const recentHtml = stats.recentMemories.map(m => `
                    <div class="memory-card ${m.type}">
                        <div class="memory-header">
                            <span class="badge badge-player">${m.playerName}</span>
                            <span class="badge badge-type">${getTypeLabel(m.type)}</span>
                        </div>
                        <div class="memory-description">${m.description}</div>
                        <div class="memory-footer">
                            <span>📅 ${m.createdAt}</span>
                        </div>
                    </div>
                `).join('');

                document.getElementById('recentMemoriesList').innerHTML = recentHtml;
            }
        }

        // 加载角色列表
        async function loadPlayers() {
            const ultramen = ['迪迦奥特曼', '赛罗奥特曼', '梦比优斯奥特曼', '艾斯奥特曼', '泰罗奥特曼'];
            const select = document.getElementById('playerFilter');

            ultramen.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }

        // 加载记忆列表
        async function loadMemories() {
            const playerFilter = document.getElementById('playerFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;

            currentFilters = {
                playerName: playerFilter,
                memoryType: typeFilter
            };

            showLoading();

            // 模拟数据 - 实际应该通过Convex查询
            setTimeout(() => {
                displayMockMemories();
            }, 500);
        }

        // 显示模拟数据
        function displayMockMemories() {
            const mockMemories = generateMockMemories();
            displayMemories({ memories: mockMemories, total: mockMemories.length, offset: 0, limit: PAGE_SIZE });
        }

        // 生成模拟记忆数据
        function generateMockMemories() {
            const players = ['迪迦奥特曼', '赛罗奥特曼', '梦比优斯奥特曼', '艾斯奥特曼', '泰罗奥特曼'];
            const types = ['conversation', 'reflection', 'relationship'];
            const memories = [];

            for (let i = 0; i < 15; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const player = players[Math.floor(Math.random() * players.length)];

                let description = '';
                let extra = '';

                if (type === 'conversation') {
                    const other = players.filter(p => p !== player)[Math.floor(Math.random() * 4)];
                    description = `与${other}在${new Date(Date.now() - i * 3600000).toLocaleString()}的对话：讨论了守护地球的使命和战斗技巧。这次交流让我对团队合作有了更深的理解。`;
                    extra = `对话对象: ${other}`;
                } else if (type === 'reflection') {
                    description = `通过最近的几次对话和训练，我意识到真正的力量不仅来自个人能力，更来自于伙伴之间的信任和支持。这是我作为奥特战士的重要成长。`;
                    extra = `基于 3 条相关记忆`;
                } else {
                    const other = players.filter(p => p !== player)[Math.floor(Math.random() * 4)];
                    description = `${other}是一位值得信赖的战友，他的战斗风格和我互补，我们配合得很好。`;
                    extra = `关于: ${other}`;
                }

                memories.push({
                    _id: `memory_${i}`,
                    playerName: player,
                    type: type,
                    description: description,
                    importance: Math.floor(Math.random() * 10),
                    createdAt: new Date(Date.now() - i * 3600000).toLocaleString('zh-CN'),
                    lastAccess: new Date(Date.now() - Math.random() * 3600000).toLocaleString('zh-CN'),
                    extra: extra
                });
            }

            // 应用过滤
            let filtered = memories;
            if (currentFilters.playerName) {
                filtered = filtered.filter(m => m.playerName === currentFilters.playerName);
            }
            if (currentFilters.memoryType) {
                filtered = filtered.filter(m => m.type === currentFilters.memoryType);
            }

            return filtered;
        }

        // 显示记忆列表
        function displayMemories(data) {
            const { memories, total, offset, limit } = data;

            totalItems = total;
            currentPage = Math.floor(offset / limit);

            const memoryList = document.getElementById('memoryList');

            if (memories.length === 0) {
                memoryList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3>暂无记忆数据</h3>
                        <p>请调整筛选条件或等待角色生成更多记忆</p>
                    </div>
                `;
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            memoryList.innerHTML = memories.map(memory => `
                <div class="memory-card ${memory.type}" onclick="showDetail('${memory._id}')">
                    <div class="memory-header">
                        <div class="memory-meta">
                            <span class="badge badge-player">${memory.playerName}</span>
                            <span class="badge badge-type">${getTypeLabel(memory.type)}</span>
                            <span class="badge badge-importance">⭐ ${memory.importance}</span>
                        </div>
                    </div>
                    <div class="memory-description">${memory.description}</div>
                    ${memory.extra ? `<div class="memory-extra">ℹ️ ${memory.extra}</div>` : ''}
                    <div class="memory-footer">
                        <span>📅 创建: ${memory.createdAt}</span>
                        <span>🕐 访问: ${memory.lastAccess}</span>
                    </div>
                </div>
            `).join('');

            // 更新分页
            updatePagination();
        }

        // 更新分页
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (totalItems <= PAGE_SIZE) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            const totalPages = Math.ceil(totalItems / PAGE_SIZE);
            pageInfo.textContent = `第 ${currentPage + 1} / ${totalPages} 页 (共 ${totalItems} 条)`;

            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= totalPages - 1;
        }

        // 翻页
        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                loadMemories();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(totalItems / PAGE_SIZE);
            if (currentPage < totalPages - 1) {
                currentPage++;
                loadMemories();
            }
        }

        // 重置过滤
        function resetFilters() {
            document.getElementById('playerFilter').value = '';
            document.getElementById('typeFilter').value = '';
            currentPage = 0;
            loadMemories();
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('memoryList').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载记忆数据中...</p>
                </div>
            `;
        }

        // 显示详情
        function showDetail(memoryId) {
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');

            // 模拟详情数据
            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">记忆ID</div>
                    <div class="detail-value">${memoryId}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">完整描述</div>
                    <div class="detail-value">这是一条详细的记忆描述...</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">向量维度</div>
                    <div class="detail-value">1536维 (OpenAI ada-002)</div>
                </div>
            `;

            modal.classList.add('active');
        }

        // 关闭Modal
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 点击背景关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 工具函数
        function getTypeLabel(type) {
            const labels = {
                'conversation': '💬 对话',
                'reflection': '💭 反思',
                'relationship': '👥 关系'
            };
            return labels[type] || type;
        }
    </script>
