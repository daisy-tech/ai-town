services:
  frontend:
    build: .
    ports:
      - '5180:5180'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_CONVEX_URL=http://127.0.0.1:${PORT:-3210}
    networks:
      - ai-town-network
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    # 保险丝：超过 2.8G 就杀掉容器重启，避免拖垮整台机器（SSH 登不上）
    mem_limit: 2800m
    ports:
      - '${PORT:-3210}:3210'
      - '${SITE_PROXY_PORT:-3211}:3211'
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-}
      - INSTANCE_SECRET=${INSTANCE_SECRET:-}
      - CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-}
      - CONVEX_CLOUD_ORIGIN=${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
      - CONVEX_SITE_ORIGIN=${URL_BASE:-http://127.0.0.1}:${SITE_PROXY_PORT:-3211}
      - DATABASE_URL=${DATABASE_URL:-}
      # 关闭遥测：低内存机器上 beacon 连不上外网时会反复重试，浪费资源
      - DISABLE_BEACON=true
    healthcheck:
      # 探测放宽：5s 一次的 curl 在系统卡顿时会堆积成僵尸进程，反而拖垮机器。
      # start_period 放大到 15 分钟，冷启动重建索引期间不计失败。
      test: curl -f http://localhost:3210/version
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 900s
    networks:
      - ai-town-network

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - '${DASHBOARD_PORT:-6791}:6791'
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:${PORT:-3210}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:

networks:
  ai-town-network:
    driver: bridge
