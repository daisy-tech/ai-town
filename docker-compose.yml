services:
  # NOTE: 前端实际由宿主机上的 pm2 进程（ai-town-frontend）serve 在 5180，
  # 这个容器从未启用；保留配置但注释掉，避免 `docker compose up -d`
  # 时和 pm2 抢 5180 端口。若要改回 docker 管理，先 pm2 stop 再解开注释。
  # frontend:
  #   build: .
  #   mem_limit: 1g
  #   ports:
  #     - '5180:5180'
  #   volumes:
  #     - .:/usr/src/app
  #     - /usr/src/app/node_modules
  #   environment:
  #     - VITE_CONVEX_URL=http://127.0.0.1:${PORT:-3210}
  #   networks:
  #     - ai-town-network
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    # 保险丝：防止拖垮整台机器（SSH 登不上）。8G 机器的预算：
    # backend 4800m + frontend 1g + dashboard 512m + 系统 ~1g ≈ 7.3G，
    # 总量不超卖，剩余靠 swap 兜底。之前 4G 机器时代的 2800m 上限
    # 会让后端反复撞墙（动作 transient error、引擎操作全部超时、
    # 小镇僵死）；一步到 6g 又会和其他进程一起超过物理内存。
    mem_limit: 4800m
    ports:
      - '${PORT:-3210}:3210'
      - '${SITE_PROXY_PORT:-3211}:3211'
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-}
      - INSTANCE_SECRET=${INSTANCE_SECRET:-}
      - CONVEX_RELEASE_VERSION_DEV=${CONVEX_RELEASE_VERSION_DEV:-}
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-}
      - CONVEX_CLOUD_ORIGIN=${URL_BASE:-http://127.0.0.1}:${PORT:-3210}
      - CONVEX_SITE_ORIGIN=${URL_BASE:-http://127.0.0.1}:${SITE_PROXY_PORT:-3211}
      - DATABASE_URL=${DATABASE_URL:-}
      # 关闭遥测：低内存机器上 beacon 连不上外网时会反复重试，浪费资源
      - DISABLE_BEACON=true
    healthcheck:
      # 探测放宽：5s 一次的 curl 在系统卡顿时会堆积成僵尸进程，反而拖垮机器。
      # start_period 放大到 15 分钟，冷启动重建索引期间不计失败。
      test: curl -f http://localhost:3210/version
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 900s
    networks:
      - ai-town-network

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - '${DASHBOARD_PORT:-6791}:6791'
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:${PORT:-3210}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:

networks:
  ai-town-network:
    driver: bridge
